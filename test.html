<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#0D1F16">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kachka Quiz — Test Run</title>
  <style>
    :root {
      --kachka-red: #B83227;
      --kachka-dark-red: #8C231A;
      --kachka-gold: #D4A843;
      --kachka-green: #1B3D28;
      --kachka-dark: #0D1F16;
      --kachka-darker: #070F0B;
      --kachka-mid: #213B2C;
      --text-light: #F0EAD6;
      --text-muted: #94B8A0;
      --glass-bg: rgba(255, 255, 255, 0.06);
      --glass-border: rgba(212, 168, 67, 0.22);
      --correct-green: #2E9E5B;
      --incorrect-red: #B83227;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--kachka-darker) 0%, var(--kachka-dark) 50%, #162B1E 100%);
      color: var(--text-light);
      -webkit-font-smoothing: antialiased;
    }

    /* ── SPLASH ── */
    .splash {
      position: fixed;
      inset: 0;
      background: linear-gradient(160deg, var(--kachka-darker) 0%, var(--kachka-dark) 50%, #162B1E 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.8s ease;
    }
    .splash.fade-out { opacity: 0; pointer-events: none; }
    .splash-inner {
      text-align: center;
      border: 2px solid var(--kachka-gold);
      padding: 3rem 4rem;
      position: relative;
      animation: splashIn 0.8s ease;
    }
    .splash-inner::before, .splash-inner::after {
      content: '';
      position: absolute;
      width: 16px; height: 16px;
      border: 2px solid var(--kachka-red);
    }
    .splash-inner::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
    .splash-inner::after  { bottom: -2px; right: -2px; border-left: none; border-top: none; }
    .splash-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(3rem, 10vw, 5rem);
      color: var(--kachka-gold);
      letter-spacing: 6px;
      line-height: 1;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
    }
    .splash-sub {
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-top: 0.75rem;
    }
    @keyframes splashIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── LAYOUT ── */
    .overlay {
      min-height: 100vh;
      padding: 2rem 1rem 3rem;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    #app {
      width: 100%;
      max-width: 600px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      backdrop-filter: blur(12px);
      padding: 2.5rem 2rem;
      margin-top: 1rem;
    }

    /* ── HEADER ── */
    .quiz-header {
      text-align: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(212,168,67,0.15);
    }
    .quiz-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    .quiz-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.2rem, 6vw, 3.2rem);
      color: var(--kachka-gold);
      letter-spacing: 6px;
      line-height: 1;
      text-shadow: 1px 1px 6px rgba(0,0,0,0.5);
    }
    .quiz-version {
      font-size: 0.8rem;
      color: var(--kachka-red);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 0.4rem;
    }

    /* ── SCREENS ── */
    .screen { display: none; }
    .screen.active { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── NAME SCREEN ── */
    .name-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.7rem;
      color: var(--text-light);
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
    }
    .name-sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.4;
    }
    input[type="text"] {
      width: 100%;
      padding: 0.9rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 2px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-light);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1.1rem;
      transition: border-color 0.3s;
    }
    input[type="text"]:focus { outline: none; border-color: var(--kachka-gold); }
    input[type="text"]::placeholder { color: rgba(148, 184, 160, 0.4); font-style: italic; }

    /* ── BUTTONS ── */
    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 1.25rem;
      padding: 1rem;
      background: linear-gradient(135deg, var(--kachka-red), var(--kachka-dark-red));
      border: none;
      border-radius: 8px;
      color: var(--text-light);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(184,50,39,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.15);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(184,50,39,0.45);
    }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; box-shadow: none; }

    .btn-next {
      display: block;
      width: 100%;
      margin-top: 1.5rem;
      padding: 0.9rem;
      background: transparent;
      border: 2px solid var(--kachka-gold);
      border-radius: 8px;
      color: var(--kachka-gold);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.25s ease;
    }
    .btn-next:hover {
      background: var(--kachka-gold);
      color: var(--kachka-dark);
      box-shadow: 0 4px 16px rgba(212,168,67,0.3);
    }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 1.75rem; }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,0.08);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--kachka-red), var(--kachka-gold));
      border-radius: 2px;
      transition: width 0.5s ease;
    }

    /* ── QUESTION ── */
    .question-text {
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: 700;
      color: var(--text-light);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .answers-grid {
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }
    .answer-btn {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.04);
      border: 2px solid rgba(212,168,67,0.15);
      border-radius: 10px;
      color: var(--text-light);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 0.98rem;
      text-align: left;
      cursor: pointer;
      transition: all 0.18s ease;
      width: 100%;
      line-height: 1.4;
    }
    .answer-btn:hover:not(:disabled) {
      border-color: var(--kachka-gold);
      background: rgba(212,168,67,0.07);
      transform: translateX(4px);
    }
    .answer-letter {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.05rem;
      color: var(--kachka-gold);
      min-width: 20px;
      flex-shrink: 0;
    }
    .answer-btn.correct  { border-color: var(--correct-green); background: rgba(46,158,91,0.12); }
    .answer-btn.incorrect{ border-color: var(--incorrect-red); background: rgba(184,50,39,0.12); }
    .answer-btn.reveal   { border-color: var(--correct-green); background: rgba(46,158,91,0.08); }
    .answer-btn:disabled { cursor: default; transform: none; }

    /* ── FEEDBACK ── */
    .feedback-box {
      margin-top: 1.25rem;
      padding: 1.1rem 1.2rem;
      border-radius: 10px;
      border: 1px solid;
      animation: fadeUp 0.3s ease;
    }
    .feedback-box.correct  { border-color: var(--correct-green); background: rgba(46,158,91,0.09); }
    .feedback-box.incorrect{ border-color: var(--incorrect-red); background: rgba(184,50,39,0.09); }

    .feedback-verdict {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 2px;
      margin-bottom: 0.4rem;
    }
    .feedback-box.correct  .feedback-verdict { color: var(--correct-green); }
    .feedback-box.incorrect .feedback-verdict { color: var(--incorrect-red); }

    .feedback-correction {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
      line-height: 1.5;
    }
    .feedback-correction strong { color: var(--text-light); }

    .fun-fact-wrap {
      border-top: 1px solid rgba(212,168,67,0.18);
      padding-top: 0.75rem;
      margin-top: 0.1rem;
    }
    .fun-fact-label {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 0.3rem;
    }
    .fun-fact-text {
      font-size: 0.88rem;
      color: var(--kachka-gold);
      font-style: italic;
      line-height: 1.55;
    }

    /* ── RESULTS ── */
    .results-top {
      text-align: center;
      padding: 1rem 0 1.5rem;
    }
    .results-score-big {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 5.5rem;
      color: var(--kachka-gold);
      line-height: 1;
      text-shadow: 0 2px 12px rgba(212,168,67,0.3);
    }
    .results-score-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 0.2rem;
    }
    .results-message {
      font-size: 1rem;
      color: var(--text-light);
      font-style: italic;
      margin-top: 0.75rem;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,67,0.2), transparent);
      margin: 1.5rem 0;
    }
    .results-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .results-list li {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 0.88rem;
      line-height: 1.4;
    }
    .r-icon { flex-shrink: 0; margin-top: 1px; font-size: 0.95rem; }
    .r-q { font-weight: 700; color: var(--text-light); margin-bottom: 0.2rem; }
    .r-ans { font-size: 0.83rem; }
    .r-ans.right  { color: var(--correct-green); }
    .r-ans.wrong  { color: var(--incorrect-red); }
    .results-thanks {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-style: italic;
    }

    @media (max-width: 480px) {
      #app { padding: 1.75rem 1.25rem; }
      .splash-inner { padding: 2rem; }
      .splash-title { font-size: 3rem; }
    }
  </style>
</head>
<body>

  <div class="splash" id="splash">
    <div class="splash-inner">
      <div class="splash-title">KACHKA</div>
      <div class="splash-sub">Front of House · Wine & Vodka</div>
    </div>
  </div>

  <div class="overlay">
    <div id="app">

      <div class="quiz-header">
        <div class="quiz-label">Front of House Training</div>
        <div class="quiz-title">KACHKA</div>
        <div class="quiz-version" id="versionLabel">Version 5 — Test Run</div>
      </div>

      <!-- Name -->
      <div class="screen active" id="screenName">
        <div class="name-heading">Ready to test your knowledge?</div>
        <p class="name-sub">Enter your name to begin. This quiz is for learning — no stress.</p>
        <input type="text" id="nameInput" placeholder="Your name" maxlength="40" autocomplete="off" />
        <button class="btn-primary" id="startBtn" disabled>Start Quiz</button>
      </div>

      <!-- Question -->
      <div class="screen" id="screenQuestion">
        <div class="progress-wrap">
          <div class="progress-meta">
            <span id="progressLabel">Question 1 of 5</span>
            <span id="scoreLabel">0 correct</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" id="progressFill" style="width:0%"></div>
          </div>
        </div>
        <div class="question-text" id="questionText"></div>
        <div class="answers-grid" id="answersGrid"></div>
        <div id="feedbackArea"></div>
        <button class="btn-next" id="nextBtn" style="display:none"></button>
      </div>

      <!-- Results -->
      <div class="screen" id="screenResults">
        <div class="results-top">
          <div class="results-score-big" id="finalScore"></div>
          <div class="results-score-sub" id="finalPct"></div>
          <div class="results-message" id="finalMsg"></div>
        </div>
        <div class="divider"></div>
        <ul class="results-list" id="resultsList"></ul>
        <p class="results-thanks">Thanks for taking the quiz. See you on the floor!</p>
      </div>

    </div>
  </div>

  <script>
    // ── TEST QUIZ DATA (hardcoded — no Firebase needed) ──
    const quiz = {
      version: 5,
      title: 'Version 5 — Test Run',
      questions: [
        {
          text: 'What is Absolut Elyx distilled from?',
          answers: ['French grapes', 'Single estate winter wheat', 'Rye', 'Potato'],
          correct: 1,
          funFact: 'Absolut Elyx is distilled in a single vintage copper still from 1921 — the manual operation of the still is so precise that it requires a master distiller to oversee every batch.'
        },
        {
          text: 'What two grape varieties is Cîroc distilled from?',
          answers: ['Chardonnay and Pinot Noir', 'Viognier and Grenache Blanc', 'Ugni Blanc and Mauzac Blanc', 'Muscat and Albariño'],
          correct: 2,
          funFact: 'Cîroc\'s Mauzac Blanc grapes come from high-altitude vineyards in Gaillac — one of the oldest wine regions in France, with documented production going back to 70 AD.'
        },
        {
          text: 'What natural ingredients are added to Beluga Noble?',
          answers: ['Maple syrup and fig extracts', 'Wild strawberry and malted barley', 'Honey and oat extract', 'Sugar syrup and lactose'],
          correct: 2,
          funFact: 'Beluga Noble is rested for at least 30 days after blending before bottling — a step unusual in vodka production that allows the ingredients to fully integrate.'
        },
        {
          text: 'What makes Bomond unusual among vodkas?',
          answers: ['It is distilled from potato and wheat', 'It uses both wheat and Ugni Blanc grapes', 'It is made from rice and barley', 'It is entirely grain-free'],
          correct: 1,
          funFact: 'Bomond uses Ugni Blanc grapes — the same grape variety used in Cognac production — giving it a faintly vinous character that sets it apart from grain-based vodkas.'
        },
        {
          text: 'What makes Kástra Elión different from nearly every other vodka?',
          answers: ['It is distilled from milk whey', 'It is made from olives and premium grains', 'It uses only fermented honey', 'It is distilled from tropical sugar cane'],
          correct: 1,
          funFact: 'Kástra Elión translates to "Castle of Olives" — the distillery sits in a centuries-old castle in Halkidiki, Greece, surrounded by olive groves that supply the olives used in production.'
        }
      ]
    };

    // ── STATE ──
    let staffName = '';
    let currentQ = 0;
    let score = 0;
    let answers = [];

    // ── DOM ──
    const $ = id => document.getElementById(id);
    const screens = { name: $('screenName'), question: $('screenQuestion'), results: $('screenResults') };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.remove('active'));
      screens[name].classList.add('active');
    }

    // Splash
    setTimeout(() => {
      $('splash').classList.add('fade-out');
      setTimeout(() => $('splash').style.display = 'none', 800);
    }, 1800);

    // Name screen
    $('nameInput').addEventListener('input', function() {
      $('startBtn').disabled = this.value.trim().length < 2;
    });
    $('nameInput').addEventListener('keypress', e => {
      if (e.key === 'Enter' && !$('startBtn').disabled) startQuiz();
    });
    $('startBtn').addEventListener('click', startQuiz);

    function startQuiz() {
      staffName = $('nameInput').value.trim();
      currentQ = 0; score = 0; answers = [];
      showScreen('question');
      renderQuestion();
    }

    function renderQuestion() {
      const q = quiz.questions[currentQ];
      const total = quiz.questions.length;

      $('progressLabel').textContent = `Question ${currentQ + 1} of ${total}`;
      $('scoreLabel').textContent = `${score} correct`;
      $('progressFill').style.width = ((currentQ / total) * 100) + '%';
      $('questionText').textContent = q.text;
      $('feedbackArea').innerHTML = '';
      $('nextBtn').style.display = 'none';

      const letters = ['A', 'B', 'C', 'D'];
      const grid = $('answersGrid');
      grid.innerHTML = '';
      q.answers.forEach((ans, i) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.innerHTML = `<span class="answer-letter">${letters[i]}</span><span>${ans}</span>`;
        btn.addEventListener('click', () => selectAnswer(i));
        if ('vibrate' in navigator) btn.addEventListener('click', () => navigator.vibrate(40));
        grid.appendChild(btn);
      });
    }

    function selectAnswer(selected) {
      const q = quiz.questions[currentQ];
      const correct = q.correct;
      const isCorrect = selected === correct;
      const letters = ['A', 'B', 'C', 'D'];

      if (isCorrect) score++;
      answers.push({ selected, correct, isCorrect, text: q.text, answers: q.answers });

      // Style buttons
      const btns = $('answersGrid').querySelectorAll('.answer-btn');
      btns.forEach((btn, i) => {
        btn.disabled = true;
        if (i === correct) btn.classList.add(isCorrect ? 'correct' : 'reveal');
        if (i === selected && !isCorrect) btn.classList.add('incorrect');
      });

      // Feedback
      const fb = document.createElement('div');
      fb.className = `feedback-box ${isCorrect ? 'correct' : 'incorrect'}`;
      fb.innerHTML = `
        <div class="feedback-verdict">${isCorrect ? '✓ Correct!' : '✗ Not quite'}</div>
        ${!isCorrect ? `<div class="feedback-correction">Correct answer: <strong>${letters[correct]}) ${q.answers[correct]}</strong></div>` : ''}
        ${q.funFact ? `
          <div class="fun-fact-wrap">
            <div class="fun-fact-label">Did you know</div>
            <div class="fun-fact-text">${q.funFact}</div>
          </div>` : ''}
      `;
      $('feedbackArea').appendChild(fb);

      // Next button
      const isLast = currentQ === quiz.questions.length - 1;
      const nextBtn = $('nextBtn');
      nextBtn.textContent = isLast ? 'See My Results' : 'Next Question →';
      nextBtn.style.display = 'block';
      nextBtn.onclick = isLast ? showResults : () => { currentQ++; renderQuestion(); };
    }

    function showResults() {
      const total = quiz.questions.length;
      const pct = Math.round((score / total) * 100);

      $('finalScore').textContent = `${score}/${total}`;
      $('finalPct').textContent = `${pct}% correct`;

      const msg = pct === 100 ? 'Perfect score. You\'re a Kachka encyclopedia.'
        : pct >= 80 ? 'Great job — the guests are in good hands.'
        : pct >= 60 ? 'Solid work. A little more review and you\'ll nail it.'
        : 'Keep studying — you\'ll get there!';
      $('finalMsg').textContent = msg;

      const list = $('resultsList');
      list.innerHTML = '';
      const letters = ['A', 'B', 'C', 'D'];
      answers.forEach((a, i) => {
        const li = document.createElement('li');
        li.innerHTML = `
          <span class="r-icon">${a.isCorrect ? '✅' : '❌'}</span>
          <div>
            <div class="r-q">Q${i + 1}: ${a.text}</div>
            <div class="r-ans ${a.isCorrect ? 'right' : 'wrong'}">
              Your answer: ${letters[a.selected]}) ${a.answers[a.selected]}
              ${!a.isCorrect ? `<br>Correct: ${letters[a.correct]}) ${a.answers[a.correct]}` : ''}
            </div>
          </div>`;
        list.appendChild(li);
      });

      showScreen('results');
    }
  </script>
</body>
</html>
