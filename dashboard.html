<!DOCTYPE html>
<html lang="en">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue:wght@400&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kachka Quiz Dashboard</title>
  <style>
    :root {
      --kachka-red: #B83227;
      --kachka-dark-red: #8C231A;
      --kachka-gold: #D4A843;
      --kachka-green: #1B3D28;
      --kachka-dark: #0D1F16;
      --kachka-darker: #070F0B;
      --kachka-mid: #213B2C;
      --text-light: #F0EAD6;
      --text-muted: #94B8A0;
      --glass-bg: rgba(255,255,255,0.06);
      --glass-border: rgba(212,168,67,0.22);
      --correct-green: #2E9E5B;
      --incorrect-red: #B83227;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto Condensed', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, var(--kachka-darker) 0%, var(--kachka-dark) 50%, #162B1E 100%);
      color: var(--text-light);
    }

    /* ── LOGIN ── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      backdrop-filter: blur(12px);
    }
    .login-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--kachka-gold);
      letter-spacing: 4px;
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .login-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 2rem;
    }
    .form-group { margin-bottom: 1.25rem; }
    .form-label {
      display: block;
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 0.4rem;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.85rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 2px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text-light);
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1rem;
      transition: border-color 0.3s;
    }
    input[type="email"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: var(--kachka-gold);
    }
    input::placeholder { color: rgba(196,168,130,0.4); }
    .btn-login {
      width: 100%;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--kachka-red), var(--kachka-dark-red));
      border: none;
      border-radius: 8px;
      color: var(--text-light);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.3rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.25s;
      margin-top: 0.5rem;
    }
    .btn-login:hover { filter: brightness(1.15); transform: translateY(-1px); }
    .login-error {
      background: rgba(192,57,43,0.15);
      border: 1px solid var(--kachka-red);
      color: #E74C3C;
      padding: 0.75rem;
      border-radius: 8px;
      margin-top: 1rem;
      font-size: 0.9rem;
      text-align: center;
      display: none;
    }

    /* ── DASHBOARD ── */
    .dash-wrap { padding: 2rem; display: none; }
    .dash-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .dash-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--kachka-gold);
      letter-spacing: 4px;
    }
    .dash-sub {
      color: var(--text-muted);
      font-size: 0.9rem;
      letter-spacing: 1px;
      margin-top: 0.2rem;
    }
    .header-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; }
    .btn-action {
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.2s;
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--glass-border);
      color: var(--text-muted);
    }
    .btn-outline:hover { border-color: var(--kachka-gold); color: var(--kachka-gold); }
    .btn-danger {
      background: transparent;
      border: 2px solid var(--kachka-red);
      color: var(--kachka-red);
    }
    .btn-danger:hover { background: var(--kachka-red); color: white; }

    /* ── QUIZ SELECTOR ── */
    .quiz-selector {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .quiz-selector label {
      color: var(--text-muted);
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .quiz-selector select {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      border-radius: 6px;
      color: var(--text-light);
      padding: 0.5rem 0.75rem;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 1rem;
      cursor: pointer;
      flex: 1;
      min-width: 180px;
    }
    .quiz-selector select:focus { outline: none; border-color: var(--kachka-gold); }
    .quiz-selector select option { background: #1a0a00; }

    /* ── STAT CARDS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 1rem;
      margin-bottom: 1.75rem;
    }
    .stat-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.25rem;
      text-align: center;
    }
    .stat-val {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.5rem;
      color: var(--kachka-gold);
      line-height: 1;
    }
    .stat-lbl {
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 0.3rem;
    }

    /* ── MISSED QUESTIONS ── */
    .section-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.5rem;
      color: var(--kachka-gold);
      letter-spacing: 3px;
      margin-bottom: 1rem;
    }
    .section-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 1.75rem;
    }
    .miss-bar {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.85rem;
    }
    .miss-q {
      flex: 1;
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.3;
    }
    .miss-q strong { color: var(--text-light); display: block; margin-bottom: 0.1rem; }
    .miss-pct-bar {
      width: 100px;
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 4px;
      flex-shrink: 0;
      overflow: hidden;
    }
    .miss-pct-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--kachka-gold), var(--kachka-red));
    }
    .miss-pct-label {
      width: 38px;
      text-align: right;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--kachka-red);
      flex-shrink: 0;
    }

    /* ── STAFF TABLE ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    thead th {
      text-align: left;
      padding: 0.6rem 0.75rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--glass-border);
      font-weight: 600;
    }
    tbody td {
      padding: 0.7rem 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      color: var(--text-muted);
      vertical-align: top;
    }
    tbody td:first-child { color: var(--text-light); font-weight: 700; }
    tbody tr:hover td { background: rgba(255,255,255,0.03); }
    .score-pill {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
      font-weight: 700;
      font-size: 0.85rem;
    }
    .score-high { background: rgba(39,174,96,0.2); color: var(--correct-green); }
    .score-mid  { background: rgba(212,168,67,0.2); color: var(--kachka-gold); }
    .score-low  { background: rgba(192,57,43,0.2); color: var(--incorrect-red); }

    /* ── EMPTY ── */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .empty-state p { font-style: italic; }

    /* ── LOADING ── */
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid rgba(212,168,67,0.2);
      border-top: 3px solid var(--kachka-gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CATEGORY BREAKDOWN ── */
    .cat-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.7rem;
    }
    .cat-label {
      width: 120px;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: capitalize;
      flex-shrink: 0;
    }
    .cat-bar {
      flex: 1;
      height: 10px;
      background: rgba(255,255,255,0.08);
      border-radius: 5px;
      overflow: hidden;
    }
    .cat-fill {
      height: 100%;
      border-radius: 5px;
      background: linear-gradient(90deg, var(--kachka-red), var(--kachka-gold));
    }
    .cat-pct {
      width: 40px;
      text-align: right;
      font-size: 0.85rem;
      color: var(--text-light);
      font-weight: 700;
    }

    @media (max-width: 600px) {
      .dash-wrap { padding: 1rem; }
      .dash-title { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <!-- LOGIN -->
  <div class="login-wrap" id="loginWrap">
    <div class="login-box">
      <div class="login-title">KACHKA</div>
      <div class="login-sub">Quiz Dashboard</div>
      <div class="form-group">
        <label class="form-label" for="email">Email</label>
        <input type="email" id="email" placeholder="your@email.com" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" />
      </div>
      <button class="btn-login" id="loginBtn">Sign In</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div class="dash-wrap" id="dashWrap">
    <div class="dash-header">
      <div>
        <div class="dash-title">QUIZ DASHBOARD</div>
        <div class="dash-sub">Kachka Front of House Training</div>
      </div>
      <div class="header-actions">
        <button class="btn-action btn-outline" id="refreshBtn">↻ Refresh</button>
        <button class="btn-action btn-danger" id="logoutBtn">Sign Out</button>
      </div>
    </div>

    <!-- Quiz selector -->
    <div class="quiz-selector">
      <label for="quizSelect">Viewing quiz:</label>
      <select id="quizSelect">
        <option value="all">All Quizzes</option>
      </select>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-val" id="statSubmissions">—</div>
        <div class="stat-lbl">Submissions</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statAvgScore">—</div>
        <div class="stat-lbl">Avg Score</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statPassing">—</div>
        <div class="stat-lbl">Passing (≥70%)</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="statTopScore">—</div>
        <div class="stat-lbl">Top Score</div>
      </div>
    </div>

    <!-- Most missed questions -->
    <div class="section-card">
      <div class="section-title">Most Missed Questions</div>
      <div id="missedList"><div class="spinner"></div></div>
    </div>

    <!-- Category breakdown -->
    <div class="section-card">
      <div class="section-title">Miss Rate by Category</div>
      <div id="catBreakdown"><div class="spinner"></div></div>
    </div>

    <!-- Individual results -->
    <div class="section-card">
      <div class="section-title">Individual Results</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Score</th>
              <th>%</th>
              <th>Date</th>
              <th>Missed</th>
            </tr>
          </thead>
          <tbody id="resultsTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Firebase -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.13.1/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.13.1/firebase-auth-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.13.1/firebase-firestore-compat.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAlHgOqWmanxs1a1cgjj5zfKJJRK0gxEDE",
      authDomain: "the-hourly-log.firebaseapp.com",
      projectId: "the-hourly-log",
      storageBucket: "the-hourly-log.firebasestorage.app",
      messagingSenderId: "634486351257",
      appId: "1:634486351257:web:8d19c3a3e497c4ace7df08"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();

    const $ = id => document.getElementById(id);

    // ── AUTH ──
    auth.onAuthStateChanged(user => {
      if (user) {
        $('loginWrap').style.display = 'none';
        $('dashWrap').style.display = 'block';
        loadDashboard();
      } else {
        $('loginWrap').style.display = 'flex';
        $('dashWrap').style.display = 'none';
      }
    });

    $('loginBtn').addEventListener('click', async () => {
      const email = $('email').value.trim();
      const pass  = $('password').value.trim();
      $('loginError').style.display = 'none';
      try {
        await auth.signInWithEmailAndPassword(email, pass);
      } catch (e) {
        $('loginError').textContent = 'Invalid email or password.';
        $('loginError').style.display = 'block';
      }
    });
    $('password').addEventListener('keypress', e => e.key === 'Enter' && $('loginBtn').click());
    $('logoutBtn').addEventListener('click', () => auth.signOut());
    $('refreshBtn').addEventListener('click', loadDashboard);
    $('quizSelect').addEventListener('change', renderDashboard);

    // ── DATA ──
    let allSubmissions = [];
    let quizMeta = {}; // quizId -> { title, questions }

    async function loadDashboard() {
      // Load all submissions
      const snap = await db.collection('kachka_quiz_submissions')
        .orderBy('timestamp', 'desc')
        .get();
      allSubmissions = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Load quiz metadata for question text
      const qSnap = await db.collection('kachka_quizzes').get();
      quizMeta = {};
      qSnap.docs.forEach(d => {
        quizMeta[d.id] = d.data();
      });

      // Populate selector
      const sel = $('quizSelect');
      const existingIds = new Set([...sel.options].map(o => o.value));
      const quizIds = [...new Set(allSubmissions.map(s => s.quizId))];
      quizIds.forEach(qid => {
        if (!existingIds.has(qid)) {
          const opt = document.createElement('option');
          opt.value = qid;
          const meta = quizMeta[qid];
          opt.textContent = meta ? (meta.title || `Quiz ${meta.version}`) : qid;
          sel.appendChild(opt);
        }
      });

      renderDashboard();
    }

    function renderDashboard() {
      const filterQuiz = $('quizSelect').value;
      const subs = filterQuiz === 'all'
        ? allSubmissions
        : allSubmissions.filter(s => s.quizId === filterQuiz);

      renderStats(subs);
      renderMissed(subs, filterQuiz);
      renderCategories(subs, filterQuiz);
      renderTable(subs);
    }

    function renderStats(subs) {
      if (!subs.length) {
        ['statSubmissions','statAvgScore','statPassing','statTopScore']
          .forEach(id => $(id).textContent = '—');
        return;
      }
      const avg = subs.reduce((a, s) => a + s.pct, 0) / subs.length;
      const passing = subs.filter(s => s.pct >= 70).length;
      const top = Math.max(...subs.map(s => s.pct));
      $('statSubmissions').textContent = subs.length;
      $('statAvgScore').textContent    = Math.round(avg) + '%';
      $('statPassing').textContent     = passing;
      $('statTopScore').textContent    = top + '%';
    }

    function renderMissed(subs, filterQuiz) {
      const container = $('missedList');
      if (!subs.length) {
        container.innerHTML = '<div class="empty-state"><p>No submissions yet.</p></div>';
        return;
      }

      // Tally misses per question index
      const missCount = {};
      const attemptCount = {};

      subs.forEach(s => {
        if (!s.answers) return;
        s.answers.forEach((a, i) => {
          attemptCount[i] = (attemptCount[i] || 0) + 1;
          if (!a.isCorrect) missCount[i] = (missCount[i] || 0) + 1;
        });
      });

      // Get question text if we have it
      const getQText = (quizId, idx) => {
        const meta = quizMeta[quizId];
        if (meta && meta.questions && meta.questions[idx]) {
          return meta.questions[idx].text;
        }
        return `Question ${idx + 1}`;
      };

      // Find a sample quizId to get question text
      const sampleQuizId = filterQuiz !== 'all' ? filterQuiz : (subs[0]?.quizId);

      const sorted = Object.entries(missCount)
        .map(([i, miss]) => ({
          idx: parseInt(i),
          miss,
          attempts: attemptCount[i] || 1,
          pct: Math.round((miss / (attemptCount[i] || 1)) * 100)
        }))
        .sort((a, b) => b.pct - a.pct)
        .slice(0, 8);

      if (!sorted.length) {
        container.innerHTML = '<div class="empty-state"><p>No missed questions yet.</p></div>';
        return;
      }

      container.innerHTML = sorted.map(item => `
        <div class="miss-bar">
          <div class="miss-q">
            <strong>Q${item.idx + 1}: ${getQText(sampleQuizId, item.idx)}</strong>
            Missed ${item.miss} of ${item.attempts} attempts
          </div>
          <div class="miss-pct-bar">
            <div class="miss-pct-fill" style="width:${item.pct}%"></div>
          </div>
          <div class="miss-pct-label">${item.pct}%</div>
        </div>
      `).join('');
    }

    function renderCategories(subs, filterQuiz) {
      const container = $('catBreakdown');
      if (!subs.length) {
        container.innerHTML = '<div class="empty-state"><p>No submissions yet.</p></div>';
        return;
      }

      // Tally by category using quiz metadata
      const catMiss = {};
      const catTotal = {};

      subs.forEach(s => {
        if (!s.answers) return;
        const meta = quizMeta[s.quizId];
        s.answers.forEach((a, i) => {
          const cat = meta?.questions?.[i]?.category || 'uncategorized';
          catTotal[cat] = (catTotal[cat] || 0) + 1;
          if (!a.isCorrect) catMiss[cat] = (catMiss[cat] || 0) + 1;
        });
      });

      const cats = Object.keys(catTotal);
      if (!cats.length) {
        container.innerHTML = '<div class="empty-state"><p>No category data yet.</p></div>';
        return;
      }

      container.innerHTML = cats.map(cat => {
        const miss = catMiss[cat] || 0;
        const total = catTotal[cat];
        const pct = Math.round((miss / total) * 100);
        return `
          <div class="cat-row">
            <div class="cat-label">${cat}</div>
            <div class="cat-bar">
              <div class="cat-fill" style="width:${pct}%"></div>
            </div>
            <div class="cat-pct">${pct}%</div>
          </div>
        `;
      }).join('');
    }

    function renderTable(subs) {
      const tbody = $('resultsTable');
      if (!subs.length) {
        tbody.innerHTML = '<tr><td colspan="5"><div class="empty-state"><p>No submissions yet.</p></div></td></tr>';
        return;
      }

      tbody.innerHTML = subs.map(s => {
        const pct = s.pct ?? Math.round((s.score / s.total) * 100);
        const scoreClass = pct >= 80 ? 'score-high' : pct >= 60 ? 'score-mid' : 'score-low';
        const date = s.timestamp ? new Date(s.timestamp).toLocaleDateString('en-US', {
          month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
        }) : '—';

        // List missed questions
        const meta = quizMeta[s.quizId];
        const missed = (s.answers || [])
          .map((a, i) => !a.isCorrect ? (meta?.questions?.[i]?.text?.substring(0, 30) + '…' || `Q${i+1}`) : null)
          .filter(Boolean);

        return `
          <tr>
            <td>${s.name || 'Anonymous'}</td>
            <td><span class="score-pill ${scoreClass}">${s.score}/${s.total}</span></td>
            <td>${pct}%</td>
            <td>${date}</td>
            <td style="font-size:0.8rem; color:var(--text-muted);">${missed.join(', ') || '—'}</td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
